<VirtualHost *:80>
    ServerName web4all.local
    DocumentRoot /var/www/html/web4all/public

    <Directory /var/www/html/web4all/public>
#        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/web4all_error.log
    CustomLog ${APACHE_LOG_DIR}/web4all_access.log combined
</VirtualHost>

<VirtualHost *:80>
    ServerName web4all.static
    DocumentRoot /var/www/html/web4all_static/public

    <Directory /var/www/html/web4all_static/public>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/web4all_error.log
    CustomLog ${APACHE_LOG_DIR}/web4all_access.log combined
</VirtualHost>
